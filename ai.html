    <style>
        body { font-family: sans-serif; text-align: center; background: #fff3e0; margin: 0; padding: 5px; user-select: none; font-size: 13px; overflow-x: hidden; }

        .player-name { color: #007bff; font-size: 14px; margin-bottom: 2px; display: block; font-weight: bold; }
        .enemy-name { color: #d9534f; font-size: 14px; margin-bottom: 2px; display: block; font-weight: bold; }
        .hp-bar-bg { width: 100%; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; margin-top: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2); }
        .hp-bar-fill { height: 100%; transition: width 0.3s, background-color 0.3s; }
        .field { min-height: 110px; border: 2px dashed #999; margin: 5px auto; width: 95%; max-width: 600px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fff; border-radius: 8px; padding: 6px; box-sizing: border-box; }
        .center-layout { display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 600px; margin: 8px auto; gap: 10px; }
        .hp-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #center-field { flex: 1.2; min-height: 80px; display: flex; justify-content: center; align-items: center; background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 5px; box-sizing: border-box; position: relative; cursor: pointer; max-width: 150px; }

        .hand { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 5px; min-height: 80px; width: 100%; padding-bottom: 5px; }
        .card { width: 110px; height: 65px; background: skyblue; border: 2px solid #007bff; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; box-sizing: border-box; font-size: 9px; font-weight: bold; cursor: pointer; position: relative; transition: height 0.2s, box-shadow 0.2s, transform 0.2s; z-index: 1; }
        .card:hover { height: 120px; background: #66b2ff; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #007bff; padding-bottom: 2px; }
        .card .card-name { font-size: 9.5px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-height: 22px; flex-grow: 1; text-align: left; }
        .card .card-stats { display: flex; gap: 2px; font-size: 8px; background: rgba(255,255,255,0.6); padding: 1px 3px; border-radius: 3px; }
        .card .card-atk { color: #d9534f; } .card .card-dfn { color: #0275d8; }
        .card .card-ability { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 7.5px; color: #222; padding-top: 2px; }
        .card .card-effect-detail { display: none; font-size: 7.5px; color: #333; background: #fff; border-radius: 3px; padding: 2px; margin-top: 3px; font-weight: normal; text-align: left; }
        .card:hover .card-effect-detail { display: block; }
        .card.selected-attacker { border: 3px solid #28a745 !important; box-shadow: 0 0 10px #28a745; transform: translateY(-5px); }
        .shield-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 191, 255, 0.2); border: 2px solid #00bfff; border-radius: 6px; box-sizing: border-box; pointer-events: none; z-index: 5; display: flex; justify-content: center; align-items: center; font-size: 24px; color: white; flex-direction: column; }
        .shield-hp { font-size: 10px; background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 4px; margin-top: 2px; }
        .attack-mark { position: absolute; top: -8px; right: -8px; font-size: 16px; filter: drop-shadow(0 0 2px white); z-index: 6; pointer-events: none; }
        button.action-btn { padding: 8px 16px; font-size: 13px; margin-top: 5px; cursor: pointer; font-weight: bold; }
        #setup-screen { background: white; padding: 15px; border-radius: 10px; max-width: 400px; width: 90%; margin: 50px auto; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #ff9800; }
        .setup-btn { background: #17a2b8; color: white; border: none; padding: 10px 15px; font-size: 14px; border-radius: 4px; cursor: pointer; margin: 5px; width: 90%; max-width: 250px; }
        .setup-btn:hover { opacity: 0.8; }
        .name-input { padding: 10px; width: 90%; max-width: 250px; font-size: 15px; text-align: center; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        .patch-notes { text-align: left; background: #fff3e0; border: 1px solid #ffcc80; padding: 10px; height: 120px; overflow-y: auto; font-size: 11px; margin-bottom: 10px; border-radius: 5px; line-height: 1.4; color: #e65100; }
        .win-counter { font-size: 16px; font-weight: bold; color: #333; margin: 10px 0; background: #e2e3e5; padding: 5px; border-radius: 5px; }
        @keyframes slashAnim { 0% { transform: translate(-50%, -50%) scale(0.5) rotate(-45deg); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.5) rotate(-45deg); opacity: 1; filter: drop-shadow(0 0 10px white); } 100% { transform: translate(-50%, -50%) scale(2) rotate(-45deg); opacity: 0; } }
        @keyframes explodeAnim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; filter: drop-shadow(0 0 10px red); } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; filter: drop-shadow(0 0 20px orange); } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        .damage-shake { animation: shake 0.4s both; background-color: #ffcccc !important; border-color: #dc3545 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
        .version-badge { background: #ff9800; color: #fff; font-size: 12px; padding: 3px 8px; border-radius: 12px; vertical-align: middle; margin-left: 5px; display: inline-block; }
        @keyframes cutinAnim { 0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; } 15%, 85% { transform: translateX(0) skewX(-15deg); opacity: 1; } 100% { transform: translateX(100%) skewX(-15deg); opacity: 0; } }
        .cutin-box { position: fixed; top: 35%; left: 0; width: 100%; background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(220,53,69,0.9) 20%, rgba(220,53,69,0.9) 80%, rgba(0,0,0,0) 100%); color: white; z-index: 10000; padding: 15px 0; text-align: center; animation: cutinAnim 2.5s forwards; pointer-events: none; border-top: 2px solid #ffc107; border-bottom: 2px solid #ffc107; }
        .cutin-name { font-size: 26px; font-weight: 900; margin: 0 0 5px 0; color: #ffc107; text-shadow: 2px 2px 4px black; }
        .cutin-text { font-size: 18px; margin: 0; font-weight: bold; font-style: italic; text-shadow: 1px 1px 3px black; }
        #surrender-btn { position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; z-index: 1000; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>

<body>

    <script>
        // ==========================================
        // グローバル変数の宣言

        let enemyName = "AI先生"; 
        let maxHp = 5000;
        let hpA = 5000, hpB = 5000, prevHpA = 5000, prevHpB = 5000; 
        let currentTurn = 'A'; 
        let handA = [], handB = [], deckA = [], deckB = [], fieldA = [], fieldB = [], buildingStack = [];

        // ★ 初期状態の生成
        function initCardState(c) {
            return { 
                ...c, canAttack: false, hanseibunTurns: 0, videoTurns: 0, silenceTurns: 0, sleepTurns: 0, 
                ballTurns: 0, deathSentenceTurns: -1, pechankoTurns: 0, fieldTurns: 1, isPetrified: false, 
                inLab: false, justReturned: false, revivesLeft: (c.id === 7) ? 3 : 0, hasRevenge: false, 
                weapons: [], shieldHP: 0, hasLocker: false, kenonTurns: 0, smokeTicket: 0, isSmoking: false, 
                isPiercing: false, isLaughing: false, attacksLeft: 0, freezeTurns: 0, isGuardian: false, 
                hasSupaneti: false, numbering: 0, bindTurns: 0, isLineTracer: false, isCriticalNext: false, 
                isSpreadAttack: false 
            };
        }

        function isMyTurn() { return currentTurn === 'A'; } 
        function canExecuteAction() { return currentTurn === 'A' || currentTurn === 'B'; }

        function sendState() {}
        function sendCutin(name, text) { triggerCutin(name, text); }

        function addLog(msg) {
            if(!msg) return; const logDiv = document.getElementById('action-log'); const entry = document.createElement('div');
            entry.style.borderBottom = "1px dashed #eee"; entry.style.padding = "4px 0"; entry.innerHTML = "・" + msg.replace(/\n/g, '<br> ');
            logDiv.appendChild(entry); logDiv.scrollTop = logDiv.scrollHeight;
        }

        function spawnEffectAtElement(elId, type, delay = 0) {
            const el = document.getElementById(elId); if (!el) return;
            const rect = el.getBoundingClientRect(); const x = rect.left + window.scrollX + rect.width / 2; const y = rect.top + window.scrollY + rect.height / 2;
            setTimeout(() => {
                const fx = document.createElement('div'); fx.innerText = type === 'slash' ? '⚔️' : '💥';
                fx.style.position = 'absolute'; fx.style.left = x + 'px'; fx.style.top = y + 'px'; fx.style.pointerEvents = 'none'; fx.style.zIndex = '9999'; fx.style.fontSize = '60px';
                fx.style.animation = type === 'slash' ? 'slashAnim 0.3s ease-out forwards' : 'explodeAnim 0.5s ease-out forwards';
                document.body.appendChild(fx); setTimeout(() => fx.remove(), 500); 
            }, delay);
        }

        function spawnDeathEffect(elId) {
            const el = document.getElementById(elId); if (!el) return;
            const rect = el.getBoundingClientRect(); const clone = el.cloneNode(true);
            clone.style.position = 'absolute'; clone.style.left = rect.left + window.scrollX + 'px'; clone.style.top = rect.top + window.scrollY + 'px';
            clone.style.margin = '0'; clone.style.zIndex = '9998'; clone.style.pointerEvents = 'none'; clone.style.transition = "all 0.8s ease-out";
            document.body.appendChild(clone);
            setTimeout(() => { clone.style.opacity = '0'; clone.style.transform = 'translateY(-80px) scale(0.6)'; }, 10);
            setTimeout(() => clone.remove(), 800);
        }

        function triggerCutin(name, text) {
            const box = document.createElement('div'); box.className = 'cutin-box';
            box.innerHTML = `<div class="cutin-name">${name}</div><div class="cutin-text">『${text}』</div>`;
            document.body.appendChild(box); setTimeout(() => box.remove(), 2500);
        }

        function sendHurry() {
            if (hurryCount >= 10) { alert("早くしろ！は1ターンに10回までです。深呼吸して待ちましょう"); return; }
            hurryCount++; addLog(`💢 【自分】「はやくしろ！！！」（${hurryCount}/10回）`);
            if (currentTurn === 'B') { setTimeout(() => { addLog(`🤖 敵:【AI先生】「焦らなくても大丈夫ですよ...計算中です」`); }, 500); }
        }

        function surrender() {
            if (!confirm("降参しますか？")) return;
            let msg = `🏳️ 【自分】が降参しました！`; hpA = 0; addLog(msg); updateScreen(); checkGameOver();

        const CARD_LIST = [

            { id: 12, type: "teacher", name: "福地", atk: 100, dfn: 100, rarity: 1, ability: "be good lose", cutin: "be good lose！負けを認めてください。", effect: "【召喚時】相手のランダムなティーチャー1体のステータスを「74」にする。" },

        class BagPool {
            constructor(type, bag = null) {
                this.type = type;
                this.baseCards = CARD_LIST.filter(c => c.type === type && c.id < 400);
                this.bag = bag ? bag : [];
            }
            draw() {
                if (this.bag.length === 0) {
                    this.bag = this.baseCards.map(c => initCardState(c)).sort(() => Math.random() - 0.5);
                }
                return this.bag.pop();
            }
        }

        async function processAiTurn() {
            if (currentTurn !== 'B') return;

            let actionTaken = true;
            while (actionTaken && currentTurn === 'B' && hpA > 0 && hpB > 0) {
                actionTaken = false;
                await new Promise(r => setTimeout(r, 800));

                if (selectionMode === 'present') {
                    let giftIdx = -1; let worstScore = 999;
                    for(let i=0; i<handB.length; i++) {
                        if(handB[i]) {
                            let score = handB[i].rarity;
                            if(handB[i].id === 501) score = -100; // AIはレポートを最優先で渡す
                            if(handB[i].id === 502) score = -5;  
                            if(score < worstScore) { worstScore = score; giftIdx = i; }
                        }
                    }
                    if (giftIdx !== -1) {
                        let gift = handB[giftIdx]; handB[giftIdx] = null;
                        let emptyIdx = handA.findIndex(c => !c);
                        if (emptyIdx !== -1) { handA[emptyIdx] = gift; addLog(`【敵】から [${gift.name}] がプレゼントされた！`); }

                        selectionMode = null;
                    } else { selectionMode = null; }
                    actionTaken = true; updateScreen(); continue;
                }

                if (selectionMode === 'teacher_27') {
                    let tIdx = fieldB.findIndex(c => c.type==='teacher' && !c.inLab && c.kenonTurns===0 && !c.isGuardian && c.id !== 27);
                    if(tIdx === -1) tIdx = fieldB.findIndex(c => c.type==='teacher' && !c.inLab && c.kenonTurns===0);
                    if(tIdx !== -1) { applySelection(tIdx, 'self'); actionTaken = true; continue; }
                    else { selectionMode = null; actionTaken = true; continue; }
                }

                let handToPlay = [...handB];
                
                let tIdx = handToPlay.findIndex(c => c && c.id === 502);
                if (tIdx !== -1 && !hasCastSpellThisTurn) { summonCard(tIdx); actionTaken = true; continue; }

                if (aiDifficulty === 'weak') {
                    for (let i = 0; i < handToPlay.length; i++) {
                        let card = handToPlay[i]; if (!card) continue;
                        if (card.type === 'none') continue; 

                        if (card.type === 'teacher' && !hasSummonedTeacherThisTurn) { summonCard(i); actionTaken = true; break; }
                        if (card.type === 'building' && !hasSummonedBuildingThisTurn) { summonCard(i); actionTaken = true; break; }
                        if (card.type === 'weapon' && !hasEquippedWeaponThisTurn && fieldB.some(c=>c.type==='teacher' && !c.inLab && c.kenonTurns===0)) {
                            let tIdx = fieldB.findIndex(c=>c.type==='teacher' && !c.inLab && c.kenonTurns===0);
                            if(tIdx !== -1) { summonCard(i); applySelection(tIdx, 'self'); actionTaken = true; break; }
                        }
                        if (card.type === 'spell' && !hasCastSpellThisTurn) {
                            if (card.id === 111) {
                                summonCard(i); let dropIdx = handB.findIndex((c, idx) => c && idx !== i);
                                if(dropIdx !== -1) { let d = handB[dropIdx]; handB[dropIdx] = null; sendToGraveyard(d, 'B'); }
                                selectionMode=null; selectedCardIndex=null; hasCastSpellThisTurn=true; updateScreen(); actionTaken=true; break;
                            } else if (card.id === 107 || card.id === 115) {
                                let tIdx = fieldB.findIndex(c=>c.type==='teacher' && !c.inLab && c.kenonTurns===0);
                                if(tIdx !== -1) { summonCard(i); applySelection(tIdx, 'self'); actionTaken=true; break; }
                            } else if (card.id === 119) {
                                let tIdx = fieldA.findIndex(c=>c.type==='teacher' && !c.inLab && c.kenonTurns===0);
                                if(tIdx !== -1) { summonCard(i); applySelection(tIdx, 'enemy'); actionTaken=true; break; }
                            } else {
                                summonCard(i); actionTaken = true; break;
                            }
                        }
                    }
                } 
                else if (aiDifficulty === 'normal' || aiDifficulty === 'strong') {
                    let bestSpellIdx = -1;
                    if (!hasCastSpellThisTurn) {
                        for(let i=0; i<handToPlay.length; i++) {
                            let c = handToPlay[i]; if(!c || c.type !== 'spell' || c.type === 'none') continue;
                            if (c.id === 109 || c.id === 117 || c.id === 110 || c.id === 113) {
                                if (aiDifficulty === 'strong') {
                                    let myPower = fieldB.reduce((sum, t) => sum + t.atk + t.dfn, 0);
                                    let enemyPower = fieldA.reduce((sum, t) => sum + t.atk + t.dfn, 0);
                                    if (enemyPower > myPower + 500 || hpB < 1000) bestSpellIdx = i; 
                                } else { bestSpellIdx = i; }
                            }
                            else if (c.id === 105) { if (fieldB.filter(t=>t.type==='teacher'&&!t.inLab&&t.kenonTurns===0).length >= 2) bestSpellIdx = i; }
                            else if (c.id === 104 || c.id === 108 || c.id === 101 || c.id === 102 || c.id === 103 || c.id === 116 || c.id === 112 || c.id === 118 || c.id === 120) { bestSpellIdx = i; }
                            else if (c.id === 111) { if (handB.filter(x=>x).length > 3) bestSpellIdx = i; }
                            else if (c.id === 106 || c.id === 114 || c.id === 119) { bestSpellIdx = i; }
                            else if (c.id === 121) { if (handB.some(x=>x && x.id===501)) bestSpellIdx = i; }
                        }
                    }
                    if (bestSpellIdx !== -1) {
                        let c = handToPlay[bestSpellIdx];
                        if (c.id === 111) {
                            summonCard(bestSpellIdx);
                            for(let k=0; k<handB.length; k++){
                                if(handB[k] && (handB[k].id === 501 || handB[k].type === 'building' || (handB[k].type==='weapon' && !fieldB.some(t=>t.type==='teacher'&&t.kenonTurns===0)))) {
                                    let d = handB[k]; handB[k] = null; sendToGraveyard(d, 'B'); addLog(`【敵】が不要な [${d.name}] を削除した。`);
                                }
                            }
                            selectionMode=null; selectedCardIndex=null; hasCastSpellThisTurn=true; updateScreen(); actionTaken=true; continue;
                        } else if (c.id === 107 || c.id === 115) {
                            let tIdx = -1; let maxA = -1;
                            fieldB.forEach((t, idx) => { if(t.type==='teacher'&&!t.inLab&&t.kenonTurns===0&&t.atk>maxA){maxA=t.atk; tIdx=idx;} });
                            if(tIdx !== -1) { summonCard(bestSpellIdx); applySelection(tIdx, 'self'); actionTaken=true; continue; }
                        } else if (c.id === 119) {
                            let tIdx = -1; let maxA = -1;
                            fieldA.forEach((t, idx) => { if(t.type==='teacher'&&!t.inLab&&t.kenonTurns===0&&t.atk>maxA){maxA=t.atk; tIdx=idx;} });
                            if(tIdx !== -1) { summonCard(bestSpellIdx); applySelection(tIdx, 'enemy'); actionTaken=true; continue; }
                        } else {
                            if (aiDifficulty === 'strong' && fieldA.some(t=>t.id===15 && !t.inLab && t.kenonTurns===0)) { /* 赤迫反射回避 */ } 
                            else { summonCard(bestSpellIdx); actionTaken = true; continue; }
                        }
                    }

                    if (!hasSummonedTeacherThisTurn) {
                        let bestTeacherIdx = -1; let bestScore = -1;
                        for (let i = 0; i < handToPlay.length; i++) {
                            let c = handToPlay[i]; if (!c || c.type !== 'teacher') continue;
                            let score = c.atk * 2 + c.dfn;
                            if (c.id === 13 && fieldA.length >= 2) score += 2000;
                            if (c.id === 1 && fieldA.length >= 2) score += 3000;
                            if (c.id === 2 || c.id === 23 || c.id === 34) score += 1500;
                            if (c.id === 4 || c.id === 22 || c.id === 24 || c.id === 25 || c.id === 20 || c.id === 21 || c.id === 26 || c.id === 27 || c.id === 28 || c.id === 29 || c.id === 30 || c.id === 31 || c.id === 32 || c.id === 33) score += 1000;
                            if (score > bestScore) { bestScore = score; bestTeacherIdx = i; }
                        }
                        if (bestTeacherIdx !== -1) { summonCard(bestTeacherIdx); actionTaken = true; continue; }
                    }

                    if (!hasEquippedWeaponThisTurn) {
                        let bestWepIdx = -1; let highestWepScore = -1;
                        for (let i = 0; i < handToPlay.length; i++) {
                            let c = handToPlay[i]; if (!c || c.type !== 'weapon') continue;
                            let wScore = c.rarity;
                            if (c.id === 211 && fieldA.some(t=>t.shieldHP>0 || t.hasLocker)) wScore += 10;
                            if (c.id === 212) wScore += 2;
                            if (wScore > highestWepScore) { highestWepScore = wScore; bestWepIdx = i; }
                        }
                        let tIdx = -1; let maxA = -1;
                        fieldB.forEach((t, idx) => { if(t.type==='teacher'&&!t.inLab&&t.kenonTurns===0&&t.atk>maxA){maxA=t.atk; tIdx=idx;} });
                        if(bestWepIdx !== -1 && tIdx !== -1) {
                            summonCard(bestWepIdx); applySelection(tIdx, 'self'); actionTaken = true; continue;
                        }
                    }

                    if (!hasSummonedBuildingThisTurn) {
                        let buildIdx = handToPlay.findIndex(c => c && c.type === 'building');
                        if (buildIdx !== -1) { summonCard(buildIdx); actionTaken = true; continue; }
                    }
                }
                
                if (actionTaken) continue;

                await new Promise(r => setTimeout(r, 800));
                
                if (!isShiratoriActive()) {
                    let attackers = []; let totalAttackPower = 0;
                    let globalBallHolders = [...fieldA, ...fieldB].filter(c => c.weapons.some(w=>w.id===210) && c.kenonTurns === 0);
                    let myEnjo = fieldB.some(c => c.id === 25 && !c.inLab && c.kenonTurns === 0);
                    
                    for (let i = 0; i < fieldB.length; i++) {
                        let c = fieldB[i];
                        if (c.type === 'teacher' && c.canAttack) {
                            if (globalBallHolders.length > 0 && !c.weapons.some(w=>w.id===210)) continue; 
                            attackers.push(i);
                            let tempAtk = c.isLaughing ? 1 : c.atk; 
                            if(c.hasSupaneti) tempAtk *= 2;
                            if(c.isCriticalNext) tempAtk *= 2;
                            totalAttackPower += tempAtk * (myEnjo && c.attacksLeft > 0 ? c.attacksLeft : 1);
                        }
                    }

                    if (attackers.length > 0 && hpA > 0 && hpB > 0) {
                        let enemyBallIdx = fieldA.findIndex(c => c.weapons.some(w=>w.id===210) && c.kenonTurns === 0);
                        let kakujiIdx = fieldA.findIndex(c => (c.id === 3 || c.isGuardian) && c.kenonTurns === 0);

                        if (aiDifficulty === 'weak') {
                            if (enemyBallIdx !== -1) fightCards(attackers, enemyBallIdx, 'enemy');
                            else if (kakujiIdx !== -1) fightCards(attackers, kakujiIdx, 'enemy');
                            else attackPlayerDirectly(attackers, 'enemy');
                            actionTaken = true; continue;
                        } 
                        else if (aiDifficulty === 'normal') {
                            if (enemyBallIdx !== -1) fightCards(attackers, enemyBallIdx, 'enemy');
                            else if (kakujiIdx !== -1) fightCards(attackers, kakujiIdx, 'enemy');
                            else {
                                let targetIdx = -1; let highestAtk = -1;
                                for(let i=0; i<fieldA.length; i++) {
                                    let t = fieldA[i];
                                    if(t.type === 'teacher' && !t.inLab && t.kenonTurns === 0) {
                                        let tempReq = t.freezeTurns > 0 ? t.dfn * 2 : t.dfn;
                                        if (totalAttackPower >= tempReq) {
                                            if(t.atk > highestAtk) { highestAtk = t.atk; targetIdx = i; }
                                        }
                                    }
                                }
                                if (targetIdx !== -1) fightCards(attackers, targetIdx, 'enemy');
                                else attackPlayerDirectly(attackers, 'enemy');
                            }
                            actionTaken = true; continue;
                        }
                        else if (aiDifficulty === 'strong') {
                            if (totalAttackPower >= hpA && enemyBallIdx === -1 && kakujiIdx === -1) {
                                attackPlayerDirectly(attackers, 'enemy'); actionTaken = true; continue;
                            }
                            if (enemyBallIdx !== -1) { fightCards(attackers, enemyBallIdx, 'enemy'); actionTaken = true; continue; }
                            if (kakujiIdx !== -1) { fightCards(attackers, kakujiIdx, 'enemy'); actionTaken = true; continue; }
                            
                            let bestTargetIdx = -1; let bestTradeScore = -1;
                            for(let i=0; i<fieldA.length; i++) {
                                let t = fieldA[i];
                                if(t.type === 'teacher' && !t.inLab && t.kenonTurns === 0) {
                                    let reqAtk = t.dfn + (t.revivesLeft * 300);
                                    if (t.freezeTurns > 0) reqAtk *= 2;
                                    
                                    if (totalAttackPower >= reqAtk || attackers.some(a => fieldB[a].isLineTracer) || attackers.some(a => fieldB[a].isPiercing)) {
                                        let score = t.atk * 2 + t.dfn;
                                        if (t.id === 5) score -= 5000; 
                                        if (t.id === 15 || t.id === 31 || t.id === 32 || t.id === 25) score += 1000; 
                                        if (score > bestTradeScore) { bestTradeScore = score; bestTargetIdx = i; }
                                    }
                                }
                            }
                            
                            if (bestTargetIdx === -1 && buildingStack.length > 0) {
                                let b = buildingStack[buildingStack.length - 1];
                                if (b.id === 301 || b.id === 302 || b.id === 303 || b.id === 309 || b.id === 312) {
                                    fightCards(attackers, 0, 'building'); actionTaken = true; continue;
                                }
                            }

                            if (bestTargetIdx !== -1) {
                                fightCards(attackers, bestTargetIdx, 'enemy'); actionTaken = true; continue;
                            } else {
                                if (fieldA.some(t => t.id === 5 && !t.inLab && t.kenonTurns === 0)) {
                                    // ジョージを回避
                                } else {
                                    attackPlayerDirectly(attackers, 'enemy'); actionTaken = true; continue;
                                }
                            }
                        }
                    }
                }
            }

            if (currentTurn === 'B' && hpA > 0 && hpB > 0) {
                await new Promise(r => setTimeout(r, 1000));
                triggerNextTurn();
            }
        }

        function sendToGraveyard(card, player) {
            let g = player === 'A' ? graveyardA : graveyardB;
            card = initCardState(card);
            g.push(card);
        }

        function drawHand(player) {
            let hand = (player === 'A' ? handA : handB); 
            let p = (player === 'A' ? poolsA : poolsB); 
            const slotTypes = ['any', 'spell', 'weapon', 'teacher', 'teacher', 'teacher'];
            while (hand.length < 6) hand.push(null);

            for (let i = 0; i < 6; i++) {
                if (!hand[i]) {
                    let targetType = slotTypes[i];
                    if (targetType === 'any') {
                        let r = Math.random();
                        if (r < 0.10) hand[i] = p.building.draw();
                        else if (r < 0.40) hand[i] = p.spell.draw();
                        else if (r < 0.70) hand[i] = p.weapon.draw();
                        else hand[i] = p.teacher.draw();
                    } else if (i === 1) { hand[i] = p.spell.draw(); } 
                    else if (i === 2) { hand[i] = p.weapon.draw(); } 
                    else { hand[i] = p.teacher.draw(); }
                }
            }
        }

        function removeWeapon(card, wId) {
            let idx = card.weapons.findIndex(w => w.id === wId);
            if (idx !== -1) { 
                card.weapons.splice(idx, 1); 
                if(wId === 205) card.atk -= 500; 
                if(wId === 211) card.isPiercing = false;
                if(wId === 212) card.dfn -= 300;
            }
        }

        function applyDamage(card, dmg, isPiercing = false) {
            if (card.freezeTurns > 0) dmg = Math.ceil(dmg / 2);
            if (isPiercing) return dmg;
            if (card.hasLocker) { card.hasLocker = false; removeWeapon(card, 207); return 0; }
            if (card.shieldHP > 0) {
                if (dmg >= card.shieldHP) { dmg -= card.shieldHP; card.shieldHP = 0; removeWeapon(card, 208); } 
                else { card.shieldHP -= dmg; dmg = 0; }
            }
            return dmg;
        }

                    alert(msg);
                    document.getElementById('win-player').innerText = playerWins;
                    document.getElementById('win-ai').innerText = aiWins;
                    document.getElementById('game-screen').style.display = 'none';
                    document.getElementById('setup-screen').style.display = 'block';
                }, 1000);
            }
        }
    </script>
</body>
</html>
